<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" rx="16" fill="#0d1117"/>

  <!-- Title -->
  <text x="550" y="48" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">Mandatory 7-Phase Development Workflow</text>
  <text x="550" y="72" text-anchor="middle" fill="#7d8590" font-size="13">Every phase is a gate. No skipping. No combining. Evidence before assertions.</text>

  <!-- Brainstorming Guard -->
  <rect x="30" y="100" width="160" height="110" rx="12" fill="#9e6a03" opacity="0.85"/>
  <text x="110" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 0</text>
  <text x="110" y="150" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Brainstorming</text>
  <text x="110" y="168" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Guard</text>
  <line x1="50" y1="178" x2="170" y2="178" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="110" y="196" text-anchor="middle" fill="#ffd8b2" font-size="10">Default: ANALYZE</text>

  <!-- Arrow -->
  <line x1="190" y1="155" x2="216" y2="155" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="196" y="132" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="205" y="145" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>

  <!-- Phase 1: Research -->
  <rect x="220" y="100" width="120" height="110" rx="12" fill="#1f6feb" opacity="0.85"/>
  <text x="280" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 1</text>
  <text x="280" y="152" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Research</text>
  <line x1="238" y1="164" x2="322" y2="164" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="280" y="180" text-anchor="middle" fill="#c8e1ff" font-size="10">Explore codebase</text>
  <text x="280" y="194" text-anchor="middle" fill="#c8e1ff" font-size="10">Gather context</text>

  <!-- Arrow -->
  <line x1="340" y1="155" x2="356" y2="155" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="342" y="132" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="351" y="145" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>

  <!-- Phase 2: Plan -->
  <rect x="360" y="100" width="120" height="110" rx="12" fill="#238636" opacity="0.85"/>
  <text x="420" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 2</text>
  <text x="420" y="152" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Plan</text>
  <line x1="378" y1="164" x2="462" y2="164" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="420" y="180" text-anchor="middle" fill="#c8f7c5" font-size="10">Write to disk</text>
  <text x="420" y="194" text-anchor="middle" fill="#c8f7c5" font-size="10">User approves</text>

  <!-- Arrow -->
  <line x1="480" y1="155" x2="496" y2="155" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="482" y="132" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="491" y="145" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>

  <!-- Phase 3: Chronicle -->
  <rect x="500" y="100" width="120" height="110" rx="12" fill="#8b5cf6" opacity="0.85"/>
  <text x="560" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 3</text>
  <text x="560" y="152" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Chronicle</text>
  <line x1="518" y1="164" x2="602" y2="164" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="560" y="180" text-anchor="middle" fill="#e8d5ff" font-size="10">Document WHY</text>
  <text x="560" y="194" text-anchor="middle" fill="#e8d5ff" font-size="10">Business context</text>

  <!-- Arrow -->
  <line x1="620" y1="155" x2="636" y2="155" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="622" y="132" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="631" y="145" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>

  <!-- Phase 4: Implement -->
  <rect x="640" y="100" width="120" height="110" rx="12" fill="#d97706" opacity="0.85"/>
  <text x="700" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 4</text>
  <text x="700" y="152" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Implement</text>
  <line x1="658" y1="164" x2="742" y2="164" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="700" y="180" text-anchor="middle" fill="#ffe4c4" font-size="10">TDD cycles</text>
  <text x="700" y="194" text-anchor="middle" fill="#ffe4c4" font-size="10">RED &gt; GREEN &gt; REFACTOR</text>

  <!-- Arrow -->
  <line x1="760" y1="155" x2="776" y2="155" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="762" y="132" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="771" y="145" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>

  <!-- Phase 5: Verify -->
  <rect x="780" y="100" width="120" height="110" rx="12" fill="#da3633" opacity="0.85"/>
  <text x="840" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 5</text>
  <text x="840" y="152" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Verify</text>
  <line x1="798" y1="164" x2="882" y2="164" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="840" y="180" text-anchor="middle" fill="#ffc0c0" font-size="10">test-verifier agent</text>
  <text x="840" y="194" text-anchor="middle" fill="#ffc0c0" font-size="10">Evidence required</text>

  <!-- Arrow -->
  <line x1="900" y1="155" x2="916" y2="155" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="902" y="132" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="911" y="145" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>

  <!-- Phase 6: Review -->
  <rect x="920" y="100" width="150" height="110" rx="12" fill="#388bfd" opacity="0.85"/>
  <text x="995" y="128" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 6</text>
  <text x="995" y="152" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Staff Review</text>
  <line x1="938" y1="164" x2="1052" y2="164" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="995" y="180" text-anchor="middle" fill="#c8e1ff" font-size="10">Spec compliance</text>
  <text x="995" y="194" text-anchor="middle" fill="#c8e1ff" font-size="10">then code quality</text>

  <!-- Arrow down to Phase 7 -->
  <line x1="995" y1="210" x2="995" y2="248" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 7: Finalize -->
  <rect x="910" y="250" width="170" height="80" rx="12" fill="#2ea043" opacity="0.85"/>
  <text x="995" y="278" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">PHASE 7</text>
  <text x="995" y="302" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Finalize</text>
  <text x="995" y="322" text-anchor="middle" fill="#c8f7c5" font-size="10">Docs, chronicle, integration</text>

  <!-- ======= Bottom: Three Layers ======= -->
  <text x="550" y="390" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Three Layers of Project Memory</text>
  <text x="550" y="412" text-anchor="middle" fill="#7d8590" font-size="12">Everything persists to disk. Context compaction cannot erase your decisions.</text>

  <!-- WHAT -->
  <rect x="80" y="435" width="280" height="140" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="80" y="435" width="280" height="36" rx="12" fill="#1f6feb" opacity="0.15"/>
  <rect x="80" y="463" width="280" height="8" rx="0" fill="#161b22"/>
  <text x="100" y="460" fill="#58a6ff" font-size="14" font-weight="700">WHAT changed</text>
  <text x="100" y="496" fill="#7d8590" font-size="12">Git diff + code</text>
  <text x="100" y="516" fill="#484f58" font-size="11" font-family="monospace">src/api/routes.py</text>
  <text x="100" y="534" fill="#484f58" font-size="11" font-family="monospace">tests/test_routes.py</text>
  <text x="100" y="556" fill="#3fb950" font-size="11" font-family="monospace">+ def get_user(id: int):</text>

  <!-- HOW -->
  <rect x="410" y="435" width="280" height="140" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="410" y="435" width="280" height="36" rx="12" fill="#238636" opacity="0.15"/>
  <rect x="410" y="463" width="280" height="8" rx="0" fill="#161b22"/>
  <text x="430" y="460" fill="#7ee787" font-size="14" font-weight="700">HOW it was built</text>
  <text x="430" y="496" fill="#7d8590" font-size="12">Plan files on disk</text>
  <text x="430" y="516" fill="#484f58" font-size="11" font-family="monospace">docs/plans/</text>
  <text x="430" y="534" fill="#484f58" font-size="11" font-family="monospace">  0042__implementation_plan</text>
  <text x="430" y="556" fill="#484f58" font-size="11" font-family="monospace">  __user-api-endpoint.md</text>

  <!-- WHY -->
  <rect x="740" y="435" width="280" height="140" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="740" y="435" width="280" height="36" rx="12" fill="#8b5cf6" opacity="0.15"/>
  <rect x="740" y="463" width="280" height="8" rx="0" fill="#161b22"/>
  <text x="760" y="460" fill="#d2a8ff" font-size="14" font-weight="700">WHY it was decided</text>
  <text x="760" y="496" fill="#7d8590" font-size="12">Chronicles on disk</text>
  <text x="760" y="516" fill="#484f58" font-size="11" font-family="monospace">docs/chronicles/</text>
  <text x="760" y="534" fill="#484f58" font-size="11" font-family="monospace">  0042__2026-03-25__user-api</text>
  <text x="760" y="556" fill="#484f58" font-size="11" font-family="monospace">  -natural-key-migration.md</text>

  <!-- Legend -->
  <rect x="30" y="588" width="18" height="18" rx="9" fill="#30363d"/>
  <text x="39" y="601" text-anchor="middle" fill="#7d8590" font-size="10" font-weight="600">G</text>
  <text x="56" y="601" fill="#7d8590" font-size="11">= Mandatory gate (cannot proceed without meeting conditions)</text>
</svg>
